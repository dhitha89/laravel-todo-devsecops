name: DevSecOps End To End Pipeline

on:
  push:
    branches: [main]

jobs:
  code-quality:
    uses: ./.github/workflows/code-quality.yml

  secrets-scan:
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  dependency-scan:
    uses: ./.github/workflows/dependency-scan.yml

  dockerfile-lint:
    uses: ./.github/workflows/dockerfile-lint.yml

  run-tests:
    uses: ./.github/workflows/phpunit-tests.yml

  build:
    needs: [code-quality, secrets-scan, dependency-scan, dockerfile-lint, run-tests]
    uses: ./.github/workflows/docker-build-push.yml
    secrets: inherit

  image-scan:
    needs: [build]
    uses: ./.github/workflows/docker-image-scan.yml
    secrets: inherit

  deploy:
    needs: [image-scan]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
