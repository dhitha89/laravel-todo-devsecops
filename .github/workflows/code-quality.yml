name: Code Quality Scan

on:
  workflow_call:

jobs:
  pint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Composer install
        uses: ramsey/composer-install@v3

      - name: Run Laravel Pint
        run: ./vendor/bin/pint --test
