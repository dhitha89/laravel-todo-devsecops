# Docker image is created and pushed to Dockerhub. The image is still not scanned
name: Docker Build & Push

on:
  workflow_call:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USER }}/laravel-todo-devsecops:${{ github.ref_name }}
            ${{ vars.DOCKERHUB_USER }}/laravel-todo-devsecops:latest
            ${{ vars.DOCKERHUB_USER }}/laravel-todo-devsecops:${{ github.sha}}
